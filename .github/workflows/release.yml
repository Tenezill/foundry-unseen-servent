name: release

# Tag-driven release (spec §1, §3): build+push the three first-party images
# to GHCR (multi-arch), then sync the generated public quickstart tree to
# Tenezill/unseen-servant. Sync runs ONLY after all image pushes succeed —
# no partial releases.
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write

concurrency:
  group: release-sync
  cancel-in-progress: false

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Refuse non-release tag formats (transform enforces vX.Y.Z)
        run: |
          if ! echo "${GITHUB_REF_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "tag ${GITHUB_REF_NAME} is not vX.Y.Z — refusing to release"
            exit 1
          fi

  build-push:
    needs: validate-tag
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        include:
          - image: unseen-servant-gateway
            dockerfile: apps/gateway/Dockerfile
          - image: unseen-servant-web
            dockerfile: apps/web/Dockerfile
          - image: unseen-servant-bootstrap
            dockerfile: apps/bootstrap/Dockerfile
    steps:
      - uses: actions/checkout@v4
      # Pin binfmt: the action's default QEMU crashes Node/V8 on emulated arm64
      # ("qemu: uncaught target signal 4 (Illegal instruction)" during pnpm
      # install). qemu v9.x carries the fix.
      - uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:qemu-v9.2.2
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/tenezill/${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/tenezill/${{ matrix.image }}:latest

  sync-quickstart:
    needs: build-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Assemble public quickstart tree
        run: node distribution/sync-quickstart.mjs --version "${GITHUB_REF_NAME}" --out /tmp/public
      - name: Push to Tenezill/unseen-servant
        env:
          TOKEN: ${{ secrets.QUICKSTART_PUSH_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/Tenezill/unseen-servant.git" /tmp/repo
          cd /tmp/repo
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/public/. .
          git config user.name "unseen-servant-release"
          git config user.email "release@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no content changes since last release"
          else
            git commit -m "release ${GITHUB_REF_NAME}"
          fi
          # -f: the public mirror is generated output; a workflow re-run for the same
          # release must be able to overwrite its own tag instead of failing.
          # Hazard: this re-run idempotency cuts both ways — re-running an OLD
          # release's workflow after a newer release exists will force-push
          # that old content back onto the public repo's main (tags stay
          # correct; only main regresses). Only re-run the latest release's
          # workflow, or re-run the newest release afterwards to restore main.
          git tag -f "${GITHUB_REF_NAME}"
          git push origin HEAD:main
          git push origin -f "refs/tags/${GITHUB_REF_NAME}"
